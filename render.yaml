services:
  - type: web
    name: aashubirthday-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URL
        sync: false        # set this manually in Render dashboard (your Atlas URL)
      - key: PORT
        value: 3000
      - key: FRONTEND_URL
        sync: false        # set this to your Netlify URL in Render dashboard
